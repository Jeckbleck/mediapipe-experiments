<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Swap (Multi-Person) | MediaPipe</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="demo-page">
    <a href="/" class="back">← Back</a>
    <h1>Face Swap — Multi-Person</h1>
    <p class="subtitle">Swap faces between people in the shot</p>
    <div class="face-swap-layout" style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;max-width:800px">
      <div class="video-container face-swap-preview" style="flex:1;min-width:320px">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
      </div>
      <aside style="flex-shrink:0;background:var(--surface);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:1rem;width:180px">
        <h3 style="font-size:0.9rem;margin-bottom:0.5rem">Backend</h3>
        <label class="toggle-label" style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem">
          <input type="checkbox" id="use-backend" />
          <span>Use Python backend</span>
        </label>
        <p id="backend-status" style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem">Run: npm run backend</p>
      </aside>
    </div>
    <p id="status" class="status">Starting camera...</p>
  </div>
  <script type="module" src="/face-swap-multi.js"></script>
</body>
</html>
