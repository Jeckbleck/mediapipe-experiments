<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Swap (Multi-Person) | MediaPipe</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="demo-page">
    <a href="/" class="back">← Back</a>
    <h1>Face Swap — Multi-Person</h1>
    <p class="subtitle">Swap faces between people in the shot</p>
    <div class="face-swap-layout" style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;max-width:800px">
      <div class="video-container face-swap-preview" style="flex:1;min-width:320px">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
      </div>
    </div>
    <p id="status" class="status">Starting camera...</p>
  </div>
  <script type="module" src="/face-swap-multi.js"></script>
</body>
</html>
