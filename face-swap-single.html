<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Swap (Single Person) | MediaPipe</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="demo-page">
    <a href="/" class="back">← Back</a>
    <h1>Face Swap — Single Person</h1>
    <p class="subtitle">Swap your face with a reference image</p>
    <div class="face-swap-layout">
      <div class="video-container face-swap-preview" id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
      </div>
      <aside class="reference-panel">
        <h3>Choose a face</h3>
        <div id="reference-grid" class="reference-grid"></div>
      </aside>
    </div>
    <p id="status" class="status">Starting camera...</p>
    <div id="debug-panel" class="debug-panel">
      <h4>Troubleshooting</h4>
      <div id="troubleshoot-status" class="troubleshoot-status"></div>
      <div class="troubleshoot-actions">
        <button type="button" id="btn-test-canvas">1. Test canvas</button>
        <button type="button" id="btn-test-overlay">2. Test overlay (needs reference + face)</button>
      </div>
      <pre id="debug-log"></pre>
      <p><small>Console: <code>DEBUG_FACESWAP=true</code> for verbose logs</small></p>
    </div>
  </div>
  <script type="module" src="/face-swap-single.js"></script>
</body>
</html>
